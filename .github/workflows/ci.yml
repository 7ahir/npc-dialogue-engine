name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Ruff lint
        run: ruff check src/ tests/
      - name: Ruff format check
        run: ruff format --check src/ tests/

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -e ".[dev,ml]"
      - name: Run fast tests
        env:
          DIALOGUE_MODEL_MODE: mock
        run: pytest tests/ -v --tb=short -m "not slow" --cov=src --cov-report=term-missing
      - name: Run slow tests (intent classifier)
        env:
          DIALOGUE_MODEL_MODE: mock
        run: pytest tests/ -v --tb=short -m "slow"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t npc-dialogue-engine:test .
      - name: Test Docker health
        run: |
          docker run -d --name npc-test -p 8000:8000 -e DIALOGUE_MODEL_MODE=mock npc-dialogue-engine:test
          # Poll the health endpoint for up to 60s instead of a hard-coded sleep —
          # ML imports (transformers, sentence-transformers) add cold-start time.
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8000/api/v1/health >/dev/null; then
              echo "API ready after ${i}×2s"
              curl -s http://localhost:8000/api/v1/health | python3 -m json.tool
              docker stop npc-test
              exit 0
            fi
            sleep 2
          done
          echo "::error::API did not become healthy within 60s"
          echo "--- container logs ---"
          docker logs npc-test || true
          docker stop npc-test || true
          exit 1
