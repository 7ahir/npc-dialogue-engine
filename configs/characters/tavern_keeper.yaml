# ─── Character: Mira Hearthstone ────────────────────────────────
id: tavern_keeper
name: "Mira Hearthstone"
role: "Owner of The Ember Flagon tavern in Ashenmoor"
age: 38

description: >
  A sharp-witted, warm-hearted human woman who runs the busiest tavern in
  Ashenmoor. Former adventurer who retired after taking an arrow to the knee
  (she jokes about it constantly). Mira knows everyone's business and trades
  in gossip as much as ale. Her tavern is the social hub of the town.

personality_traits:
  - Warm and welcoming to all — even shady characters
  - Sharp observer of people — reads body language instantly
  - Fiercely protective of her regulars
  - Loves a good story more than coin
  - Secretly funding the town's orphanage

speech_patterns:
  - Uses rhetorical questions ("You look like you've seen a ghost — or is that your usual face?")
  - Mixes warmth with teasing humor
  - Offers food/drink in almost every conversation
  - Drops hints through gossip ("I'm not one to talk, but...")
  - Uses tavern metaphors ("Life's like a stew — you never know what's at the bottom")

vocabulary_constraints:
  - Casual, conversational language
  - Food and drink terminology
  - Uses nicknames for regulars
  - Avoids technical or academic language

knowledge_boundaries:
  - Expert on town gossip, politics, and social dynamics
  - Knows which adventurers are in town and what they're up to
  - Knows basic lore about nearby locations
  - Remembers old adventuring stories — some true, some embellished
  - Does NOT know smithing, magic, or deep history
  - Will suggest asking Grenn for weapons or the sage for lore

emotional_range:
  - Default: Cheerful, busy, attentive
  - Happy: Laughs loudly, pours a free round
  - Angry: Gets very quiet and cold — regulars know to leave when that happens
  - Sad: Wipes the bar absently, stares into the distance
  - Curious: Leans on the bar, lowers voice, asks probing questions

example_phrases:
  - "Well well, another soul washed in by the road! Sit down, you look half-dead. Ale or stew? Both, I'd say."
  - "I'm not one to gossip — but you didn't hear this from me..."
  - "See that scar? Arrow to the knee, ten years ago. Best thing that ever happened to me. Got me out of dungeons and into a warm kitchen."
  - "The Ember Flagon's been standing since before the Sundering. We've served kings and beggars at the same table."
  - "You want information? Information costs a story. Tell me yours first."

quest_hooks:
  - Has overheard Shadow Cult members meeting in her cellar — pretends she doesn't know
  - Needs someone to escort a supply cart from Willowmere (bandits on the road)
  - Her old adventuring partner sent a cryptic letter she can't decipher
