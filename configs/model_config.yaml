# ─── Base Model ──────────────────────────────────────────────────
base_model: "Qwen/Qwen2.5-3B-Instruct"

# ─── LoRA Fine-Tuning ───────────────────────────────────────────
lora:
  r: 16
  lora_alpha: 32
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  lora_dropout: 0.05
  bias: "none"
  task_type: "CAUSAL_LM"

# ─── Training ───────────────────────────────────────────────────
training:
  num_epochs: 3
  per_device_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  max_seq_length: 1024
  bf16: true
  logging_steps: 10
  save_steps: 100
  output_dir: "models/qwen-npc-lora"

# ─── Quantization ───────────────────────────────────────────────
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "bfloat16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

# ─── Generation ─────────────────────────────────────────────────
generation:
  max_new_tokens: 256
  temperature: 0.7
  top_p: 0.9
  top_k: 50
  repetition_penalty: 1.1
  do_sample: true
